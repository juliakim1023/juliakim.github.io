profile:
  name: "Julia Kim"
  title: "Doctor of Medicine · Intern, Mount Gambier Hospital"
  location: "Mount Gambier, South Australia"
  email: "Juliakim370@gmail.com"
  # Headshot: save your photo in the repo at assets/img/headshot.jpg
  # then set the path below (leave "" to hide the photo).
  photo: ""
  photo_alt: "Dr Julia Kim"

summary: >-
  Current intern at Mount Gambier Hospital and Doctor of Medicine graduate of
  Flinders University, with clinical experience across regional and metropolitan
  South Australia and an international elective at Oxford University Hospitals, UK.
  Alongside clinical training, I have held leadership roles including Senior Vice
  President of the Flinders Medical Student Society and representative positions
  with AMA SA, SA MET, the South Australian Clinical Training Council and AMA
  Doctors in Training. My research experience includes publications and
  international presentations in psychiatry, neuroimaging and health equity,
  including receipt of the Royal College of Psychiatrists International Congress
  Bursary Award for the highest-scoring abstract in the West Pacific Division.
  I have a strong interest in rural and regional healthcare, mental health and
  medical education, and am seeking opportunities to further develop broad
  generalist clinical skills while contributing to high-quality patient care and
  multidisciplinary teams.

